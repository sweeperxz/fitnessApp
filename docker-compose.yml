services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fitness_db
      # Локальный безопасный набор: контейнер фронта (Nginx :3000) и Vite dev (:5173).
      # В проде задайте CORS_ORIGINS через env с реальными доменами фронтенда (через запятую).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      FATSECRET_CLIENT_ID: ${FATSECRET_CLIENT_ID:-}
      FATSECRET_CLIENT_SECRET: ${FATSECRET_CLIENT_SECRET:-}
      FATSECRET_SCOPE: ${FATSECRET_SCOPE:-basic barcode}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  pgdata:
